<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="indstillinger.css">

</head>
<body>
<div id=left>
    <button id=homebtn onclick="location.href='index.html'">< -</button>
    <h2>Indstillinger</h2>

    <div id="settingsIsConnected"></div>

</div>
<div id=middle>
    <button class="wide" id="fetchCurrentSettingsBtn"> --- FETCH CURRENT SETTINGS ---</button>
    <p>Lys Varighet(s)</p>
    <input type="range" min="1" max="25" value="3" class="slider" id="lightDurationSlider" oninput="this.nextElementSibling.value = this.value">
    <output>3</output>
    <p>Sensitivitet Bevegelse(cm)</p>
    <input type="range" min="2" max="10" value="6" class="slider" id="movementTrigSensitivity" oninput="this.nextElementSibling.value = this.value">
    <output>6</output>
    <p>Triggerdistanse Bevegelsessensor(cm)</p>
    <input type="range" min="2" max="400" value="100" class="slider" id="distance" oninput="this.nextElementSibling.value = this.value">
    <output>100</output>
    <p>Max Lysstyrke(%)</p>
    <input type="range" min="1" max="100" value="80" class="slider" id="maxLightStrength" oninput="this.nextElementSibling.value = this.value">
    <output>80</output>
    <p>Standby Lysstyrke(%)</p>
    <input type="range" min="1" max="100" value="40" class="slider" id="standbyLightStrength" oninput="this.nextElementSibling.value = this.value">
    <output>40</output>

    <button class=wide id="changeSettingBtn"> --- SUBMIT SETTING CHANGES ---</button>

</div>
<div id=right></div>

<script src="indstillinger.js"></script>
</body>
</html>
